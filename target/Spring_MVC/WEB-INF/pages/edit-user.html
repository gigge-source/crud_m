<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Edit user</title>
</head>
<body>

<h1>Edit user</h1>

<form th:action="@{/users/update}" method="post">
    <input type="hidden" name="id" th:value="${user.id}">

    <input type="text" name="name" th:value="${user.name}" unescapeHtml="Name">
    <input type="text" name="surname" th:value="${user.surname}" unescapeHtml="Surname">
    <input type="number" name="age" th:value="${user.age}" placeholder="Age">
    <input type="text" name="email" th:value="${user.email}" placeholder="Email">

    <input type="submit" value="Update User">
</form>

</body>
</html>
